<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Ejercicios JavaScript</h1>

    <!-- Ejercicio 1: Saludo personalizado -->
    <div class="ejercicio ejercicio--saludo">
        <h2 class="ejercicio__titulo">Ejercicio 1: Saludo personalizado</h2>
        <p class="ejercicio__resultado" id="resultado-saludo"></p>
    </div>

    <!-- Ejercicio 2: Área del rectángulo -->
    <div class="ejercicio ejercicio--area">
        <h2 class="ejercicio__titulo">Ejercicio 2: Área del rectángulo</h2>
        <p class="ejercicio__resultado" id="resultado-area"></p>
    </div>

    <!-- Ejercicio 3: Promedio de tres notas -->
    <div class="ejercicio ejercicio--promedio">
        <h2 class="ejercicio__titulo">Ejercicio 3: Promedio de notas</h2>
        <p class="ejercicio__resultado" id="resultado-promedio"></p>
    </div>

    <!-- Ejercicio 4: Conversión de monedas -->
    <div class="ejercicio ejercicio--monedas">
        <h2 class="ejercicio__titulo">Ejercicio 4: Conversión de monedas</h2>
        <p class="ejercicio__resultado" id="resultado-monedas"></p>
    </div>

    <!-- Ejercicio 5: Conversión de temperatura -->
    <div class="ejercicio ejercicio--temperatura">
        <h2 class="ejercicio__titulo">Ejercicio 5: Conversión de temperatura</h2>
        <p class="ejercicio__resultado" id="resultado-temperatura"></p>
    </div>

    <!-- Scripts -->
    <script src="ejercicio1.js"></script>
    <script src="ejercicio2.js"></script>
    <script src="ejercicio3.js"></script>
    <script src="ejercicio4.js"></script>
    <script src="ejercicio5.js"></script>
</body>

</html>
